        <h1 class="headerTitle">Stationnement sur voie publique a Paris</h1>

          <input class="searchBar" type="search" id="search" name="search" placeholder="rechercher...">
          <p class="resultAmount">Résultats trouvés :</p>
          <button type="button" class="filterBTN btn">Filtres</button>
        </section>

        <form class="filterPanel cache">

          <label for="categorie">Catégorie :</label>
          <select id="categorie" name="categorie">
            <option value="">Choisissez la catégorie</option>
            <option value="2 ROUES">2 Roues</option>
            <option value="LIVRAISON">Livraison</option>
            <option value="LOCATION">Location</option>
            <option value="GIG/GIC">GIG/GIC</option>
            <option value="PAYANT MIXTE">Payant mixte</option>
            <option value="PAYANT ROTATIF">Payant rotatif</option>
            <option value="ELECTRIQUE">Electrique</option>
          </select>

          <label for="type">Type :</label>
          <select id="type" name="type">
            <option value="">Choisissez le type de place</option>
            <option value="Bataille">Bataille</option>
            <option value="Epi">Épi</option>
            <option value="Longitudinale">Longitudinale</option>
          </select>

          <label for="numberFilter">Nombre de place souhaité :</label>
          <input type="number" id="numberFilter" name="numberFilter" placeholder="0" class="inputBarre">

          <p for="taille" >Taille :</p>
          <div id="taille" class="sizeSearch">
            <input class="inputBarre" type="number" id="longueur" name="longueur" placeholder="0m">
            <p>x</p>
            <input class="inputBarre" type="number" id="largeur" name="largeur" placeholder="0m">
          </div>

          <button type="submit" class="btnClassique applyBTN">Appliquer</button>

        </form>
    </header>
